            text-align: center;
            font-size: 2.8rem;
            background: linear-gradient(90deg, #7b2cbf, #c77dff, #e0aaff);

            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);

        input {

            border-radius: 15px;

        input:disabled {
            border-color: #4a4a6a;
            color: #b8b8d8;
            cursor: not-allowed;
        }

            font-size: 1.2rem;

            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(123, 44, 191, 0.4);
            margin-bottom: 15px;
        }

        button:hover {
            transform: scale(1.02);
        }

        button:disabled {
            background: #4a4a6a;
            cursor: not-allowed;
            transform: none;
        }
